name: CI/CD - Scan → Build → Push → Deploy to local KIND

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:          # Allows manual run from GitHub UI

jobs:

  secret-scan:
    name: Scan for leaked secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # Needed for full history scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml   # optional: create your own config if needed
          fail-on: high                 # fail only on high/critical findings

  build-scan-push:
    name: Build Docker image + Trivy scan + Push to GHCR
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nginx-arun:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nginx-arun:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Container)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/nginx-arun:${{ github.sha }}'
          format: 'table'
          exit-code: '1'                    # fail pipeline on findings
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'

  deploy-to-kind:
    name: Deploy to local KIND cluster (self-hosted Mac runner)
    needs: build-scan-push
    runs-on: self-hosted                 # ← Your MacBook runner!
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'   # only on push to main
    steps:
      - name: Checkout code (for manifests)
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Update image in Deployment
        run: |
          kubectl set image deployment/myapp myapp=ghcr.io/${{ github.repository_owner }}/nginx-arun:${{ github.sha }}
          kubectl rollout status deployment/myapp --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=myapp -o wide
          kubectl get svc myapp-service
